<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">QuickShipper bulk order flow</title>
  <desc id="desc">A curated Spree catalog feeds a bulk ordering interface. The resulting QuickOrder groups case quantities by brand and category, calculates shipping, and supports warehouse delivery, invoicing, and tracking.</desc>
  <rect width="960" height="500" fill="#080b0c"/>
  <g fill="none" stroke="#26302c" stroke-width="2">
    <rect x="35" y="95" width="190" height="280" rx="8"/><rect x="275" y="95" width="190" height="280" rx="8"/><rect x="515" y="95" width="190" height="280" rx="8"/><rect x="755" y="95" width="170" height="280" rx="8"/>
  </g>
  <g font-family="ui-monospace, monospace" font-size="16" fill="#e5b566" text-anchor="middle">
    <text x="130" y="135">SPREE CATALOG</text><text x="370" y="135">BULK ORDER UI</text><text x="610" y="135">QUICKORDER</text><text x="840" y="135">OPERATIONS</text>
  </g>
  <g font-family="ui-sans-serif, sans-serif" font-size="15" fill="#d9e0dc">
    <text x="65" y="190">Curated products</text><text x="65" y="225">Partner taxon</text><text x="65" y="260">Case pricing</text><text x="65" y="295">Shipping rules</text>
    <text x="305" y="190">Case quantities</text><text x="305" y="225">Category groups</text><text x="305" y="260">Warehouse</text><text x="305" y="295">Running totals</text>
    <text x="545" y="190">Line items</text><text x="545" y="225">Shipping totals</text><text x="545" y="260">Order status</text><text x="545" y="295">Partner notes</text>
    <text x="785" y="190">Invoice</text><text x="785" y="225">Payment state</text><text x="785" y="260">Tracking</text><text x="785" y="295">Order history</text>
  </g>
  <g stroke="#75bfff" stroke-width="3" fill="#75bfff">
    <line x1="225" y1="235" x2="275" y2="235"/><polygon points="275,235 265,229 265,241"/><line x1="465" y1="235" x2="515" y2="235"/><polygon points="515,235 505,229 505,241"/><line x1="705" y1="235" x2="755" y2="235"/><polygon points="755,235 745,229 745,241"/>
  </g>
  <text x="480" y="430" fill="#86d99a" font-family="ui-monospace, monospace" font-size="17" text-anchor="middle">ONE PRODUCT SOURCE · A PURPOSE-BUILT ORDER LIFECYCLE</text>
</svg>
