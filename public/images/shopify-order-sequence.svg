<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">Brand-specific Shopify order transmission sequence</title>
  <desc id="desc">A completed Dogly order is grouped by brand. Previously transmitted groups are skipped, eligible groups are sent to Shopify, and external IDs or errors are persisted separately.</desc>
  <rect width="960" height="500" fill="#080b0c"/>
  <g font-family="ui-monospace, monospace" font-size="17" text-anchor="middle">
    <text x="120" y="52" fill="#e5b566">DOGLY ORDER</text><text x="360" y="52" fill="#e5b566">TRANSMITTER</text><text x="600" y="52" fill="#e5b566">BRAND CONFIG</text><text x="840" y="52" fill="#e5b566">SHOPIFY</text>
  </g>
  <g stroke="#26302c" stroke-width="2" stroke-dasharray="6 7"><path d="M120 75 V450"/><path d="M360 75 V450"/><path d="M600 75 V450"/><path d="M840 75 V450"/></g>
  <g stroke-width="3">
    <g stroke="#75bfff" fill="#75bfff"><line x1="120" y1="115" x2="350" y2="115"/><polygon points="350,115 340,109 340,121"/><line x1="360" y1="170" x2="590" y2="170"/><polygon points="590,170 580,164 580,176"/><line x1="360" y1="290" x2="830" y2="290"/><polygon points="830,290 820,284 820,296"/></g>
    <g stroke="#86d99a" fill="#86d99a"><line x1="600" y1="225" x2="370" y2="225"/><polygon points="370,225 380,219 380,231"/><line x1="840" y1="345" x2="370" y2="345"/><polygon points="370,345 380,339 380,351"/><line x1="360" y1="400" x2="130" y2="400"/><polygon points="130,400 140,394 140,406"/></g>
  </g>
  <g font-family="ui-sans-serif, sans-serif" font-size="15" fill="#d9e0dc">
    <text x="160" y="104">group line items by brand</text><text x="405" y="159">credentials + fulfillment mode</text><text x="412" y="214">eligible; external ID absent</text><text x="505" y="279">create brand-specific no-charge order</text><text x="575" y="334">external order ID</text><text x="172" y="389">persist success or scoped error</text>
  </g>
</svg>
