<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Dogly membership journey before and after</title>
  <desc id="desc">The original journey required users to browse advocates and content manually. The guided journey connects a stated problem to topics, daily guidance, expert conversation, live groups, and subscription value.</desc>
  <rect width="960" height="560" fill="#080b0c"/>
  <g font-family="ui-monospace, monospace" font-size="18" fill="#e5b566">
    <text x="60" y="70">BEFORE: USER PULLS VALUE FROM THE LIBRARY</text>
    <text x="60" y="285">AFTER: THE PRODUCT GUIDES THE NEXT USEFUL STEP</text>
  </g>
  <g fill="none" stroke="#26302c" stroke-width="2">
    <rect x="60" y="105" width="220" height="90" rx="7"/><rect x="370" y="105" width="220" height="90" rx="7"/><rect x="680" y="105" width="220" height="90" rx="7"/>
    <rect x="35" y="325" width="150" height="105" rx="7"/><rect x="220" y="325" width="150" height="105" rx="7"/><rect x="405" y="325" width="150" height="105" rx="7"/><rect x="590" y="325" width="150" height="105" rx="7"/><rect x="775" y="325" width="150" height="105" rx="7"/>
  </g>
  <g font-family="ui-sans-serif, sans-serif" font-size="16" fill="#d9e0dc" text-anchor="middle">
    <text x="170" y="145">Browse Advocate</text><text x="170" y="172">index</text><text x="480" y="145">Inspect profiles</text><text x="480" y="172">and content</text><text x="790" y="145">Find something</text><text x="790" y="172">useful</text>
    <text x="110" y="365">Describe a</text><text x="110" y="392">problem</text><text x="295" y="365">Match topics</text><text x="295" y="392">and experts</text><text x="480" y="365">Receive daily</text><text x="480" y="392">guidance</text><text x="665" y="365">Ask and join</text><text x="665" y="392">live groups</text><text x="850" y="365">Build progress</text><text x="850" y="392">and return</text>
  </g>
  <g stroke="#929e98" stroke-width="3" fill="#929e98">
    <line x1="280" y1="150" x2="370" y2="150"/><polygon points="370,150 360,144 360,156"/><line x1="590" y1="150" x2="680" y2="150"/><polygon points="680,150 670,144 670,156"/>
  </g>
  <g stroke="#75bfff" stroke-width="3" fill="#75bfff">
    <line x1="185" y1="378" x2="220" y2="378"/><polygon points="220,378 210,372 210,384"/><line x1="370" y1="378" x2="405" y2="378"/><polygon points="405,378 395,372 395,384"/><line x1="555" y1="378" x2="590" y2="378"/><polygon points="590,378 580,372 580,384"/><line x1="740" y1="378" x2="775" y2="378"/><polygon points="775,378 765,372 765,384"/>
  </g>
  <text x="480" y="500" fill="#86d99a" font-family="ui-monospace, monospace" font-size="17" text-anchor="middle">TAGS · EMAIL · DAILY AGENDA · CONVERSATION · ZOOM · SUBSCRIPTION</text>
</svg>
