name: Build and deploy portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1
        with:
          bundler-cache: true

      - name: Run tests
        env:
          CI: true
        run: bin/rails test

      - name: Check Ruby style
        run: bin/rubocop

      - name: Scan for security issues
        run: bundle exec brakeman --no-pager --quiet

      - name: Compile production assets
        env:
          RAILS_ENV: production
          SECRET_KEY_BASE_DUMMY: 1
        run: bin/rails assets:precompile

      - name: Build and validate static site
        env:
          RAILS_ENV: production
          SECRET_KEY_BASE_DUMMY: 1
          SITE_DOMAIN: www.jaredharbison.com
        run: bin/rails site:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
